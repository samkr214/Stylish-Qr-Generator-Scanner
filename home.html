<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
  
  <header>
    <link rel="stylesheet" href="style.css">
    <div style="display: flex; align-items: center; gap: 10px; height: 35px;">
      <h2>Qr Code Generator</h2>
    </div>
  <div class="menu">
    <button id="toggleTheme">🌙</button>
    <button id="menuBtn">☰</button>

    <div class="dropdown" id="dropdown">
      <a href="home.html">Home</a>
      <a href="scan.html">Scan</a>
      <a href="history.html">History</a>
      <a href="about.html">About</a>
    </div>
  </div>
</header>

<section>
  <div class="card flex">
    
    <div class="form">
      <h2>Generate Your Stylish QR Code</h2>

      <input type="text" id="text" placeholder="Type text or link here">

      <label>QR Color:</label>
      <input type="color" id="qrColor" value="#000000">

      <label>QR Background:</label>
      <input type="color" id="bgColor" value="#ffffff">
      
      <label>QR Size:</label>
      <input type="number" id="size" value="200">
      
      <button onclick="generateQR()">Generate QR Code</button>
      <input type="file" id="logoInput" accept="image*">
         </div>
    
    <div class="preview hidden" id="previewBox">
      <div id="qrcode"></div>
      <div id="downloadOptions" style="display:none;">
        <button onclick="downloadPNG()">Download Image</button>
        <button onclick="downloadPDF()">Download PDF</button>
      </div>
    </div>

  </div>
</section>
<footer>
© 2026 Stylish QR Generator | Designed by Mr Sam 
<a href="https://github.com/samkr214" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" 
       alt="GitHub Logo" 
       class="git-icon">
</a>
</footer>
<script src="script.js"></script>
</body>
</html>
