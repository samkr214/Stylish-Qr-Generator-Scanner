<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan QR</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>


<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";
</script>

</head>

<body>

<header>
  <h2>QR Code Generator</h2>
  <div class="menu">
    <button id="menuBtn">☰</button>
    <div class="dropdown" id="dropdown">
      <a href="index.html">Home</a>
      <a href="scan.html">Scan</a>
      <a href="history.html">History</a>
      <a href="about.html">About</a>
    </div>
  </div>
</header>

<section class="active">
  <div class="card">
    <h2>Scan QR </h2>

    <button onclick="startCamera()">Start Camera</button>
    <button id="switchCameraBtn">🔄 Switch Camera</button>

    <input type="file" id="scanImageInput">

    <div class="scanner-container">
      <video id="video"></video>
      <div id="scanBox"></div>
    </div>

    <canvas id="scanCanvas" style="display:none;"></canvas>

    <button id="scanBtn">Scan Now</button>
    
    <div id="scanResult"></div>
    <button id="copyBtn" style="display:none;">Copy Result</button>

  </div>
</section>

<footer>
  © 2026 Stylish QR Generator | Designed by Mr Sam 
  <a href="https://github.com/samkr214" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" 
         alt="GitHub Logo" 
         class="git-icon">
  </a>
</footer>

<script src="script.js"></script>

</body>
</html>
